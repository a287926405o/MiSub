name = "misub"
compatibility_date = "2024-04-01"
compatibility_flags = ["nodejs_compat"]

# Cloudflare Pages 部署配置
pages_build_output = "dist"
main = "functions"

build = { command = "npm run build", cwd = "./" }

# Cron Triggers（在 Pages 仪表板设置）
# [triggers]
# crons = ["0 * * * *"]

# KV 和 D1 绑定通过 Cloudflare Pages UI 设置
# [[kv_namespaces]]
# binding = "KV_STORAGE"
# id = "your-kv-id"

# 环境变量通过 Cloudflare Pages UI 设置（不要硬编码敏感信息）
